<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="HTML, CSS, JavaScript" />
    <meta name="author" content="Veysel Demirel • Veysel In Digital World" />
    <meta name="description" content="Dashboard frame with a sweet look." />
    <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg">
    <link rel="stylesheet" href="./assets/css/main.css" />
    <title>Sweet Dashboard</title>
</head>

<body>
    <div id="loader">
        <div class="candy">
            <img src="./assets/images/candy.svg" alt="Candy Loader">
        </div>
    </div>
    <header>
        <div class="header-container">
            <div id="toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="user">
                <img src="./assets/images/veysel-demirel.jpg" alt="Veysel Demirel" />
            </div>
        </div>
    </header>
    <main>
        <div id="sidebar">
            <ul>
                <a href="#">
                    <li>Lolly</li>
                </a>
                <a href="#">
                    <li>Candy</li>
                </a>
                <a href="#">
                    <li>Doughnut</li>
                </a>
                <a href="#">
                    <li>Pastry</li>
                </a>
                <a href="#">
                    <li>Cake</li>
                </a>
            </ul>
        </div>
        <div id="pageBody">
            <div class="page-container">
                <div class="card-grid">
                    <div class="card text-primary">
                        <div class="card-information">
                            <div class="number">812</div>
                            <div class="title">Daily Views</div>
                        </div>
                        <div class="icon">
                            <i class="bi bi-eye-fill"></i>
                        </div>
                    </div>
                    <div class="card text-secondary">
                        <div class="card-information">
                            <div class="number">546</div>
                            <div class="title">Weekly Downloads</div>
                        </div>
                        <div class="icon">
                            <i class="bi bi-cloud-arrow-down-fill"></i>
                        </div>
                    </div>
                    <div class="card text-success">
                        <div class="card-information">
                            <div class="number">630</div>
                            <div class="title">Total Visitor</div>
                        </div>
                        <div class="icon">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                    <div class="card text-danger">
                        <div class="card-information">
                            <div class="number">242</div>
                            <div class="title">Monthly Like</div>
                        </div>
                        <div class="icon">
                            <i class="bi bi-heart-fill"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="./app/app.js" defer></script>
</body>

</html>
